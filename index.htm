<!DOCTYPE HTML>
<html>
<head>
<meta charset=utf-8>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
<title>Document</title>
</head>
<body>
<main>
<div id="u">
</div>
</main>
<script>
var u = document.querySelector("#u");
var n = 1024;
var newArray = Array.from({ length: n }, (value, index) => index);
u.innerText = String.fromCodePoint(...newArray);
</script>
</body>
</html>
